# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - wa-motorsportsCal-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: src

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      
      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Move build files for deployment
        run: |
          mv ./build/static ./build/standalone/build
          if [ -d "public" ]; then mv ./public ./build/standalone; fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0394C58092454D3999F3FD7252DF3911 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E912EAB2D38F4C1EA4C919FBAB08278C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7B3364C63A494CF78498C1103C1A8322 }}

      - name: Troubleshoot
        run: |
          ls
          pwd

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wa-motorsportsCal-dev'
          slot-name: 'Production'
          package: ./src/build/standalone
